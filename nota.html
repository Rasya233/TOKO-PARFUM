<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Nota Pembelian</title>

  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 50px;
    }

    .nota {
      background: #000;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 15px rgba(245,215,110,0.3);
    }

    h2 {
      color: #f5d76e;
    }

    p {
      font-size: 18px;
    }

    a, button {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: #f5d76e;
      color: #111;
      border-radius: 20px;
      text-decoration: none;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="nota">
  <h2>Nota Pembelian</h2>

  <p id="nama"></p>
  <p id="produk"></p>
  <p id="jumlah"></p>

  <button onclick="kirimWA()">Kirim ke WhatsApp</button>
  <br>
  <a href="index.html">Kembali ke Beranda</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);

const nama = params.get("nama");
const produk = params.get("produk");
const jumlah = params.get("jumlah");

document.getElementById("nama").innerText = "Nama: " + nama;
document.getElementById("produk").innerText = "Produk: " + produk;
document.getElementById("jumlah").innerText = "Jumlah: " + jumlah;

function kirimWA() {
  const noWA = "6285745110908"; // GANTI dengan nomor kamu (pakai 62, tanpa 0)

  const pesan = `Halo, saya ingin memesan parfum:

Nama: ${nama}
Produk: ${produk}
Jumlah: ${jumlah}

Terima kasih`;

  const url = `https://wa.me/${noWA}?text=${encodeURIComponent(pesan)}`;

  window.open(url, "_blank");
}
</script>

</body>
</html>
