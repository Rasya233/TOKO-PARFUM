<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pemesanan Parfum</title>

  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', sans-serif;
      background: linear-gradient(to bottom, #111, #222);
      color: #fff;
    }

    section {
      padding: 80px 20px;
      text-align: center;
    }

    h2 {
      color: #f5d76e;
    }

    form {
      max-width: 650px;
      margin: 40px auto;
      text-align: left;
      background: #000;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(245,215,110,0.3);
    }

    label {
      color: #f5d76e;
      display: block;
      margin-top: 15px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #f5d76e;
      color: #111;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<section>
  <h2>Pemesanan Parfum</h2>

  <form onsubmit="kirimKeNota(event)">
    
    <label>Nama Lengkap</label>
    <input type="text" id="nama" required>

    <label>Email</label>
    <input type="email" id="email" required>

    <label>Pilih Parfum</label>
    <select id="parfum">
      <option>De Marly Athalia</option>
      <option>De Marly Delina</option>
      <option>De Marly Palatine</option>
      <option>De Marly Layton</option>
      <option>De Marly Darley</option>
      <option>De Marly Haltane</option>
      <option>De Marly Althair</option>
      <option>De Marly Kalan</option>
      <option>De Marly Godolphin</option>
    </select>

    <label>Jumlah</label>
    <input type="number" id="jumlah" required>

    <button type="submit">Pesan Sekarang</button>

  </form>
</section>



  <script>



window.onload = function () {

  const urlParams = new URLSearchParams(window.location.search);

  const produkDipilih = urlParams.get('produk');

  if (produkDipilih) {

    const select = document.getElementById("parfum");

    for (let i = 0; i < select.options.length; i++) {

      if (select.options[i].text === produkDipilih) {

        select.selectedIndex = i;

        break;

      }
    }
  }
}

function kirimKeNota(event) {

  event.preventDefault();

  const nama = document.getElementById("nama").value;

  const email = document.getElementById("email").value;

  const parfum = document.getElementById("parfum").value;

  const jumlah = document.getElementById("jumlah").value;

  window.location.href =
    "nota.html?" +
    "nama=" + encodeURIComponent(nama) +
    "&email=" + encodeURIComponent(email) +
    "&parfum=" + encodeURIComponent(parfum) +
    "&jumlah=" + encodeURIComponent(jumlah);

}



</script>



</body>
</html>
