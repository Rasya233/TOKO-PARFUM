<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Konfirmasi Pesanan</title>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', sans-serif;
      background: linear-gradient(to bottom, #111, #222); 
      color: #fff;
      text-align: center;
    }
    .container {
      max-width: 700px;
      margin: auto;
      padding: 100px 20px;
    }
    h1 {
      color: #f5d76e;
      font-size: 3em;
      margin-bottom: 20px;
      animation: fadeIn 2s ease-in-out;
    }
    p {
      color: #ccc;
      font-size: 1.2em;
      line-height: 1.8;
      margin-bottom: 40px;
      animation: fadeIn 3s ease-in-out;
    }
    .cta {
      display: inline-block;
      padding: 14px 35px;
      background-color: #f5d76e;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 30px;
      transition: 0.3s;
    }
    .cta:hover {
      background-color: #fff;
      color: #111;
    }
    footer {
      margin-top: 80px;
      padding: 20px;
      background-color: #000;
      color: #888;
      font-size: 0.9em;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ Terima Kasih ✨</h1>
    <p>
      Pesanan parfum Anda telah berhasil dikirim.<br>
      Tim <strong>Rasya Parfume</strong> akan segera menghubungi Anda melalui <strong>Email</strong>, untuk konfirmasi pembayaran dan pengiriman.<br>
      Nikmati pengalaman mewah bersama koleksi parfum eksklusif kami.
    </p>
    <a href="halamanutama.html" class="cta">Kembali ke Beranda</a>
  </div>

  <footer>
    &copy; 2026 Rasya Parfume. Semua Hak Dilindungi.
  </footer>
</body>
</html>
